services:
  db:
    image: postgres:16-alpine
    container_name: auxilius_tasks
    environment:
      POSTGRES_DB: ${DB_NAME:-auxilius_tasks}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-auxilius_tasks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/backend
    container_name: auxilius_api
    command: sh -c "npm run migrate:up && npm run seed:up && npm start"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      PGHOST: ${DOCKER_DB_HOST:-db}
      PGPORT: ${DB_PORT:-5432}
      PGDATABASE: ${DB_NAME:-auxilius_tasks}
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"

volumes:
  postgres_data:
